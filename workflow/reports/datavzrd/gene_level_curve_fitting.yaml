__use_yte__: true

name: "Gene-Level Curve Fitting Statistics"

default-view: gene_level_curve_fitting

max-in-memory-rows: 20000

datasets:
  gene_level_curve_fitting:
    path: ?input.table
    separator: "\t"
    offer-excel: true

views:
  gene_level_curve_fitting:
    dataset: gene_level_curve_fitting
    desc: |
      Sigmoid curve fit per gene, summarizing the full depletion time course into
      a handful of parameters. `um` is the depletion rate and `R2` is fit quality
      (near 1 = good fit). Raw per-timepoint LFC values are shown alongside the
      fitted curve; `time_points` is redundant with the column headers and hidden.
    page-size: 50
    render-table:
      columns:
        Name:
          link-to-url:
            PomBase:
              url: "https://www.pombase.org/gene/{Systematic ID}"
              new-window: true
        FYPOviability:
          plot:
            heatmap:
              scale: ordinal
              color-scheme: category10
        DeletionLibrary_essentiality:
          plot:
            heatmap:
              scale: ordinal
              color-scheme: category10
        time_points:
          display-mode: hidden
        Status:
          plot:
            heatmap:
              scale: ordinal
              color-scheme: category10
        um:
          precision: 3
          plot:
            heatmap:
              scale: linear
              range: ["white", "#b2182b"]
        R2:
          precision: 3
          plot:
            heatmap:
              scale: linear
              range: ["#b2182b", "white", "#2166ac"]
              domain: [-1, 0, 1]
        AIC:
          display-mode: hidden
        BIC:
          display-mode: hidden
        normalized_RMSE:
          display-mode: hidden
        regex('^YES.*_residual$'):
          display-mode: hidden
        regex('^YES(?!.*_residual$).*$'):
          precision: 3
          plot:
            heatmap:
              scale: linear
              range: ["#2166ac", "white", "#b2182b"]
              domain: [-2, 0, 8]
